services:
  db:
    image: postgres:16-alpine
    container_name: jerney-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: jerney_user
      POSTGRES_PASSWORD: jerney_pass_2026
      POSTGRES_DB: jerney_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jerney_user -d jerney_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    tmpfs:
      - /tmp
      - /run

  backend:
    image: asadjvd/jerney-backend:latest
    container_name: jerney-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: "5000"
      DB_USER: jerney_user
      DB_PASSWORD: jerney_pass_2026
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: jerney_db
    expose:
      - "5000"
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp

  frontend:
    image: asadjvd/jerney-frontend:latest
    container_name: jerney-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    security_opt:
      - no-new-privileges:true

volumes:
  pgdata:
    driver: local
